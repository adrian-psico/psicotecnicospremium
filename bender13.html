<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Bender - Psicotécnicos Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lamina-img { 
            max-height: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            border-radius: 12px; 
            margin: 0 auto; 
            background: white; 
            padding: 15px; 
        }
    </style>
</head>

<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="test-container" class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

        <div class="bg-[#8fa3bf] py-3 text-center">
            <span class="text-black font-black uppercase tracking-[0.3em] text-xs">Psicotécnicos Premium</span>
        </div>

        <!-- Nombre y empresa -->
        <p id="nombreMostrado" class="text-center text-gray-700 text-sm mt-2"></p>
        <p id="empresaMostrada" class="text-center text-gray-600 text-sm mb-2"></p>

        <div class="bg-gray-100 py-6 text-center border-b border-gray-200 px-6">
            <span class="text-teal-800 uppercase tracking-widest text-xs">
                <u class="font-black">Consigna</u>: 
                <span class="font-light italic">Dibuje la figura en una hoja blanca. Al terminar, suba una foto nítida.</span>
            </span>
        </div>

        <div class="p-8 md:p-12">

            <div class="mb-8">
                <div class="flex justify-between text-xs font-bold text-teal-700 uppercase mb-2">
                    <span id="progreso-texto">Figura 1 de 9</span>
                    <span id="porcentaje-texto">11%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progreso-barra" class="bg-teal-600 h-2 rounded-full transition-all duration-500" style="width: 11%"></div>
                </div>
            </div>

            <div id="content" class="space-y-8">

                <div class="text-center bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <img id="lamina-display" src="b1.jpeg" alt="Lámina Bender" class="lamina-img">
                </div>

                <div class="bg-teal-50 p-8 rounded-2xl border-2 border-dashed border-teal-200 text-center">
                    <input type="file" id="file-input" accept="image/*" capture="environment"
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 
                        file:rounded-full file:border-0 file:text-sm file:font-semibold 
                        file:bg-teal-700 file:text-white hover:file:bg-teal-800 cursor-pointer">
                    <p id="status-msg" class="text-[10px] text-teal-600 mt-2 uppercase"></p>
                </div>

                <button id="btn-siguiente" onclick="procesarImagen()"
                    class="w-full bg-teal-700 hover:bg-teal-800 text-white font-bold py-4 rounded-xl shadow-lg transform transition-all active:scale-95">
                    Confirmar y Siguiente
                </button>

            </div>
        </div>
    </div>

    <!-- Campos ocultos -->
    <input type="hidden" id="evaluado" name="Evaluado">
    <input type="hidden" id="empresa" name="Empresa">

    <script>

        /* ----------------------------------------------------
           1) TOMAR NOMBRE Y EMPRESA DESDE LA URL
        ---------------------------------------------------- */
        const params = new URLSearchParams(window.location.search);
        const nombreEvaluado = params.get("nombre");
        const empresaNombre = params.get("empresa");

        if (nombreEvaluado) {
            document.getElementById("evaluado").value = nombreEvaluado;
            document.getElementById("nombreMostrado").textContent =
                "Evaluando a: " + nombreEvaluado;
        }

        if (empresaNombre) {
            document.getElementById("empresa").value = empresaNombre;
            document.getElementById("empresaMostrada").textContent =
                "Empresa: " + empresaNombre;
        }

        /* ----------------------------------------------------
           2)  BENDER
        ---------------------------------------------------- */
        const figuras = ["b1.jpeg", "b2.jpeg", "b3.jpeg", "b4.jpeg", "b5.jpeg", "b6.jpeg", "b7.jpeg", "b8.jpeg", "b9.jpeg"];
        let pasoActual = 0;
        let imagenesComprimidas = [];

        async function procesarImagen() {
            const fileInput = document.getElementById('file-input');
            const btn = document.getElementById('btn-siguiente');
            const status = document.getElementById('status-msg');

            if (fileInput.files.length === 0) {
                alert("Por favor, suba la foto del dibujo.");
                return;
            }

            btn.disabled = true;
            status.innerText = "Procesando imagen...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);

            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;

                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    const MAX_WIDTH = 1200;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        imagenesComprimidas.push(blob);
                        status.innerText = "";
                        btn.disabled = false;
                        avanzarOEnviar();
                    }, 'image/jpeg', 0.7);
                };
            };
        }

        function avanzarOEnviar() {
            if (pasoActual < figuras.length - 1) {
                pasoActual++;
                document.getElementById('lamina-display').src = figuras[pasoActual];
                document.getElementById('file-input').value = "";
                
                const porc = ((pasoActual + 1) / 9) * 100;
                document.getElementById('progreso-texto').innerText = `Figura ${pasoActual + 1} de 9`;
                document.getElementById('porcentaje-texto').innerText = Math.round(porc) + "%";
                document.getElementById('progreso-barra').style.width = porc + "%";
                window.scrollTo(0,0);
            } else {
                enviarFinal();
            }
        }

        async function enviarFinal() {
            const btn = document.getElementById('btn-siguiente');
            btn.disabled = true;
            btn.innerText = "Enviando Respuestas...";

            const formData = new FormData();

            imagenesComprimidas.forEach((blob, i) => {
                formData.append(`Figura_${i+1}`, blob, `figura_${i+1}.jpg`);
            });

            formData.append("Profesional", "Lic. Andrea Civati");
            formData.append("Empresa", empresaNombre || "");
            formData.append("Evaluado", nombreEvaluado || "");
            formData.append("Test", "Bender");

            try {
                const response = await fetch("https://formspree.io/f/mreaggra", {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    redirigirSiguiente();
                } else {
                    alert("Error en el envío de Formspree.");
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Error de red. Intente nuevamente.");
                btn.disabled = false;
            }
        }

        function redirigirSiguiente() {
            setTimeout(() => {
                window.location.href =
                    "graficos9.html?nombre=" + encodeURIComponent(nombreEvaluado) +
                    "&empresa=" + encodeURIComponent(empresaNombre || "");
            }, 800);
        }

    </script>
</body>
</html>
